
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بطولة 2 ضد 2 - نظام القرعة الاحترافي</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #1a1a2e;
            --bg-card: #16213e;
            --neon-cyan: #00ffff;
            --neon-purple: #ff00ff;
            --neon-pink: #ff006e;
            --neon-green: #00ff88;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --shadow-neon: 0 0 20px rgba(0, 255, 255, 0.5);
            --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Header */
        header {
            background: linear-gradient(90deg, var(--bg-card), var(--bg-secondary), var(--bg-card));
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid var(--neon-cyan);
            box-shadow: var(--shadow-neon);
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
            animation: slideHeader 3s infinite;
        }

        @keyframes slideHeader {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .header-content {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
        }

        .logo {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.8);
            animation: pulse 2s infinite;
            border: 2px solid var(--neon-cyan);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        h1 {
            font-size: 3rem;
            background: linear-gradient(45deg, var(--neon-cyan), var(--neon-purple), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { filter: brightness(1); }
            to { filter: brightness(1.2); }
        }

        /* Main Layout */
        main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
            display: grid;
            grid-template-columns: 1fr 1.2fr 1fr;
            gap: 30px;
        }

        /* Cards */
        .card {
            background: var(--bg-card);
            border-radius: 15px;
            padding: 25px;
            box-shadow: var(--shadow-card);
            border: 1px solid rgba(0, 255, 255, 0.2);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple), var(--neon-pink));
            animation: slideTop 3s linear infinite;
        }

        @keyframes slideTop {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 255, 255, 0.3);
            border-color: var(--neon-cyan);
        }

        .card h2 {
            color: var(--neon-cyan);
            margin-bottom: 20px;
            font-size: 1.5rem;
            text-align: center;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
        }

        /* Players Section */
        .player-input {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            background: var(--bg-secondary);
            border: 2px solid rgba(0, 255, 255, 0.3);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
        }

        button {
            padding: 12px 20px;
            background: linear-gradient(45deg, var(--neon-cyan), var(--neon-purple));
            border: none;
            border-radius: 8px;
            color: var(--text-primary);
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 255, 255, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        .players-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            max-height: 300px;
            overflow-y: auto;
            flex: 1;
        }

        .player-chip {
            background: linear-gradient(45deg, var(--bg-secondary), var(--bg-card));
            border: 1px solid var(--neon-cyan);
            padding: 6px 12px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
            animation: fadeIn 0.3s ease;
            box-shadow: 0 2px 10px rgba(0, 255, 255, 0.2);
            font-size: 14px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        .player-chip:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 255, 255, 0.4);
        }

        .remove-player {
            background: var(--neon-pink);
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            transition: all 0.3s ease;
        }

        .remove-player:hover {
            background: #ff0044;
            transform: rotate(90deg);
        }

        /* Wheel Section */
        .wheel-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            flex: 1;
            justify-content: center;
        }

        #wheelCanvas {
            border: 3px solid var(--neon-cyan);
            border-radius: 50%;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.5);
            background: var(--bg-primary);
            max-width: 350px;
            max-height: 350px;
            width: 350px;
            height: 350px;
        }

        .wheel-pointer {
            width: 0;
            height: 0;
            border-left: 25px solid transparent;
            border-right: 25px solid transparent;
            border-top: 50px solid var(--neon-pink);
            position: relative;
            top: -25px;
            filter: drop-shadow(0 0 15px var(--neon-pink));
            animation: bounce 2s infinite, pointerGlow 1s ease-in-out infinite alternate;
            z-index: 10;
        }

        /* Add a clear target indicator */
        .wheel-pointer::before {
            content: '';
            position: absolute;
            top: -60px;
            left: -15px;
            width: 30px;
            height: 30px;
            background: var(--neon-pink);
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 0 20px var(--neon-pink);
            animation: pulse 1s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes pointerGlow {
            0% { filter: drop-shadow(0 0 15px var(--neon-pink)); }
            100% { filter: drop-shadow(0 0 30px var(--neon-pink)); }
        }

        .spin-button {
            background: linear-gradient(45deg, var(--neon-green), var(--neon-cyan));
            padding: 15px 40px;
            font-size: 18px;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.6);
            transition: all 0.3s ease;
        }

        .spin-button:hover:not(:disabled) {
            box-shadow: 0 0 40px rgba(0, 255, 136, 0.8);
            transform: scale(1.05);
        }

        .spin-button:disabled {
            cursor: not-allowed;
            opacity: 0.8;
        }

        /* Spinning animation for the wheel container */
        .wheel-container.spinning {
            animation: containerShake 0.2s ease-in-out infinite;
        }

        @keyframes containerShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-2px); }
            75% { transform: translateX(2px); }
        }

        /* Matches Section */
        .matches-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 350px;
            overflow-y: auto;
            flex: 1;
        }

        .match-card {
            background: linear-gradient(135deg, var(--bg-secondary), var(--bg-card));
            border: 1px solid var(--neon-purple);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
            animation: slideIn 0.5s ease;
            transition: all 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .match-card:hover {
            transform: translateX(-5px);
            box-shadow: 0 5px 20px rgba(255, 0, 255, 0.4);
            border-color: var(--neon-purple);
        }

        .teams {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0;
        }

        .team {
            background: var(--bg-primary);
            padding: 8px 12px;
            border-radius: 5px;
            border: 1px solid var(--neon-cyan);
            flex: 1;
            margin: 0 5px;
        }

        .vs {
            color: var(--neon-pink);
            font-weight: bold;
            font-size: 18px;
            text-shadow: 0 0 10px var(--neon-pink);
        }

        /* Tournament Bracket */
        .tournament-bracket {
            background: var(--bg-card);
            border-radius: 15px;
            padding: 25px;
            margin-top: 30px;
            border: 1px solid var(--neon-green);
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
            overflow-x: auto;
        }

        .bracket-title {
            color: var(--neon-green);
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 30px;
            text-shadow: 0 0 15px var(--neon-green);
        }

        .bracket-container {
            display: flex;
            gap: 30px;
            justify-content: center;
            align-items: flex-start;
            overflow-x: auto;
            padding: 20px 0;
            min-height: 400px;
        }

        .bracket-round {
            text-align: center;
            min-width: 200px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .round-title {
            color: var(--neon-cyan);
            margin-bottom: 20px;
            font-size: 1.2rem;
            position: sticky;
            top: 0;
            background: var(--bg-card);
            padding: 10px;
            border-radius: 5px;
            z-index: 10;
        }

        .bracket-match {
            background: var(--bg-secondary);
            border: 1px solid var(--neon-purple);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 15px;
            width: 100%;
            max-width: 220px;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .bracket-match:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 0, 255, 0.3);
        }

        .match-header {
            color: var(--neon-cyan);
            font-weight: bold;
            margin-bottom: 10px;
            text-align: center;
        }

        .match-teams {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 10px;
        }

        .bracket-team {
            background: var(--bg-primary);
            padding: 8px;
            border-radius: 5px;
            border: 1px solid var(--neon-cyan);
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .team-color {
            font-size: 16px;
            font-weight: bold;
        }

        .bracket-vs {
            color: var(--neon-pink);
            font-weight: bold;
            text-align: center;
            font-size: 14px;
            text-shadow: 0 0 5px var(--neon-pink);
        }

        .winner-btn {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: none;
            border-radius: 5px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 12px;
        }

        .winner-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 255, 136, 0.6);
        }

        .champion-btn {
            background: linear-gradient(45deg, #FFD700, #FFA500) !important;
            font-size: 14px;
            padding: 12px;
            animation: championGlow 2s ease-in-out infinite alternate;
        }

        .winner-placeholder {
            color: var(--text-secondary);
            font-style: italic;
            text-align: center;
            padding: 20px 0;
        }

        /* Winner Animations */
        @keyframes winnerPop {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 0;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0;
            }
        }

        @keyframes championBounce {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }

        @keyframes championGlow {
            0% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.6); }
            100% { box-shadow: 0 0 40px rgba(255, 215, 0, 0.9); }
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--neon-cyan);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--neon-purple);
        }

        /* Responsive Design */
        @media (max-width: 1200px) {
            main {
                grid-template-columns: 1fr 1fr;
                gap: 15px;
                padding: 15px;
            }

            .bracket-container {
                flex-direction: column;
                align-items: center;
                gap: 20px;
            }
        }

        @media (max-width: 1024px) {
            main {
                grid-template-columns: 1fr;
                gap: 15px;
                padding: 15px;
                height: auto;
                overflow-y: auto;
            }

            h1 {
                font-size: 2rem;
            }

            .bracket-container {
                flex-direction: column;
                align-items: center;
                gap: 20px;
                min-height: auto;
            }

            .bracket-round {
                width: 100%;
                max-width: 300px;
            }
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 10px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .card {
                padding: 15px;
                min-height: 300px;
            }

            #wheelCanvas {
                width: 300px !important;
                height: 300px !important;
            }

            .players-list {
                max-height: 200px;
            }

            .matches-list {
                max-height: 300px;
            }

            .bracket-container {
                gap: 15px;
            }

            .bracket-match {
                max-width: 100%;
            }
        }

        @media (max-width: 480px) {
            header {
                padding: 15px 10px;
            }

            main {
                padding: 10px;
            }

            .card {
                padding: 10px;
                min-height: 250px;
            }

            h1 {
                font-size: 1.2rem;
            }

            h2 {
                font-size: 1rem;
            }

            #wheelCanvas {
                width: 250px !important;
                height: 250px !important;
            }

            .spin-button {
                padding: 10px 20px;
                font-size: 14px;
            }

            .tournament-bracket {
                padding: 15px;
            }

            .bracket-container {
                padding: 10px 0;
            }
        }

        /* Loading Animation */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid var(--neon-cyan);
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <img src="src/1.jpg" class="logo" alt="Tournament Logo 1">
            <h1>بطولة 2 ضد 2</h1>
            <img src="src/2.jpg" class="logo" alt="Tournament Logo 2">
        </div>
    </header>

    <main>
        <!-- Players Section -->
        <section class="card">
            <h2>قسم اللاعبين</h2>
            <div class="player-input">
                <input type="text" id="playerName" placeholder="أدخل اسم اللاعب" maxlength="20">
                <button onclick="addPlayer()">إضافة</button>
            </div>
            <div class="players-list" id="playersList"></div>
        </section>

        <!-- Wheel Section -->
        <section class="card">
            <h2>عجلة القرعة</h2>
            <div class="wheel-container">
                <div class="wheel-pointer"></div>
                <canvas id="wheelCanvas" width="350" height="350"></canvas>
                <button class="spin-button" id="spinButton" onclick="spinWheel()">دور العجلة</button>
            </div>
        </section>

        <!-- Matches Section -->
        <section class="card">
            <h2>قسم المباريات</h2>
            <div class="matches-list" id="matchesList"></div>
        </section>
    </main>

    <!-- Tournament Bracket -->
    <div class="tournament-bracket" id="tournamentBracket" style="display: none;">
        <h2 class="bracket-title">🏆 شجرة البطولة 🏆</h2>
        <div class="bracket-container" id="bracketContainer"></div>
    </div>

    <script>
        // Global Variables
        let players = [];
        let availablePlayers = [];
        let selectedPlayers = [];
        let matches = [];
        let tournamentWinners = {
            quarterFinals: [],
            semiFinals: [],
            final: null
        };
        let isSpinning = false;
        let currentRotation = 0;

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            drawWheel();
            document.getElementById('playerName').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    addPlayer();
                }
            });
        });

        // Player Management
        function addPlayer() {
            const input = document.getElementById('playerName');
            const name = input.value.trim();
            
            if (name === '') {
                showMessage('الرجاء إدخال اسم اللاعب', 'error');
                return;
            }
            
            if (players.some(p => p.name === name)) {
                showMessage('اللاعب موجود بالفعل', 'error');
                return;
            }
            
            if (players.length >= 32) {
                showMessage('تم الوصول للحد الأقصى من اللاعبين (32)', 'error');
                return;
            }
            
            const player = {
                id: Date.now(),
                name: name,
                color: getRandomColor()
            };
            
            players.push(player);
            availablePlayers.push(player);
            input.value = '';
            updatePlayersList();
            drawWheel();
            showMessage(`تم إضافة ${name} بنجاح (${players.length}/32)`, 'success');
            
            // Check if we can create tournament bracket
            checkTournamentReadiness();
        }

        function removePlayer(playerId) {
            const player = players.find(p => p.id === playerId);
            players = players.filter(p => p.id !== playerId);
            availablePlayers = availablePlayers.filter(p => p.id !== playerId);
            updatePlayersList();
            drawWheel();
            showMessage(`تم حذف ${player.name} (${players.length}/32)`, 'info');
            
            // Check tournament readiness
            checkTournamentReadiness();
        }

        function checkTournamentReadiness() {
            const totalPlayers = players.length;
            const selectedCount = selectedPlayers.length;
            const availableCount = availablePlayers.length;
            
            // Show progress indicator
            const progressDiv = document.getElementById('tournamentProgress');
            if (!progressDiv) {
                const div = document.createElement('div');
                div.id = 'tournamentProgress';
                div.style.cssText = `
                    background: var(--bg-card);
                    border: 1px solid var(--neon-cyan);
                    border-radius: 10px;
                    padding: 15px;
                    margin: 20px 0;
                    text-align: center;
                `;
                document.querySelector('main').appendChild(div);
            }
            
            let progressHTML = `<h3 style="color: var(--neon-cyan); margin-bottom: 10px;">📊 تقدم البطولة</h3>`;
            progressHTML += `<div style="display: flex; justify-content: space-around; margin-bottom: 10px;">`;
            progressHTML += `<div>👥 الإجمالي: ${totalPlayers}</div>`;
            progressHTML += `<div>🎯 متاحون: ${availableCount}</div>`;
            progressHTML += `<div>✅ مختارون: ${selectedCount}</div>`;
            progressHTML += `</div>`;
            
            // Check for tournament readiness
            if (totalPlayers >= 16) {
                progressHTML += `<div style="color: var(--neon-green); font-weight: bold;">`;
                if (totalPlayers === 16) {
                    progressHTML += `🏆 جاهز لبطولة 16 لاعب (8 مباريات)`;
                } else if (totalPlayers === 32) {
                    progressHTML += `🏆 جاهز لبطولة 32 لاعب (16 مباريات)`;
                } else {
                    progressHTML += `🎯 ${totalPlayers} لاعب - يمكن بدء بطولة 16 لاعب`;
                }
                progressHTML += `</div>`;
                
                if (matches.length >= 4 && totalPlayers === 16) {
                    progressHTML += `<button onclick="createTournamentBracket()" style="margin-top: 10px; background: var(--neon-green); color: black; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer;">🚀 بدء البطولة</button>`;
                }
            } else {
                progressHTML += `<div style="color: var(--neon-pink);">⏳ تحتاج ${16 - totalPlayers} لاعبين إضافيين لبطولة 16 لاعب</div>`;
            }
            
            document.getElementById('tournamentProgress').innerHTML = progressHTML;
        }

        function updatePlayersList() {
            const container = document.getElementById('playersList');
            container.innerHTML = '';
            
            players.forEach(player => {
                const chip = document.createElement('div');
                chip.className = 'player-chip';
                chip.innerHTML = `
                    <span style="color: ${player.color}">●</span>
                    <span>${player.name}</span>
                    <button class="remove-player" onclick="removePlayer(${player.id})">×</button>
                `;
                container.appendChild(chip);
            });
        }

        // Wheel Functions
        function drawWheel() {
            const canvas = document.getElementById('wheelCanvas');
            const ctx = canvas.getContext('2d');
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = 120;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (availablePlayers.length === 0) {
                ctx.fillStyle = '#666';
                ctx.font = '16px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('أضف لاعبين للبدء', centerX, centerY);
                return;
            }
            
            const anglePerPlayer = (2 * Math.PI) / availablePlayers.length;
            
            availablePlayers.forEach((player, index) => {
                const startAngle = index * anglePerPlayer + currentRotation;
                const endAngle = startAngle + anglePerPlayer;
                
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.closePath();
                ctx.fillStyle = player.color;
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(startAngle + anglePerPlayer / 2);
                ctx.textAlign = 'center';
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 12px Arial';
                ctx.fillText(player.name, radius / 2, 0);
                ctx.restore();
            });
            
            ctx.fillStyle = '#fff';
            ctx.fill();
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // Draw selection indicator line at top (where pointer points)
            ctx.beginPath();
            ctx.moveTo(centerX, centerY - radius);
            ctx.lineTo(centerX, centerY - radius - 10);
            ctx.strokeStyle = '#FFD700';
            ctx.lineWidth = 4;
            ctx.stroke();
            
            // Highlight the segment at the pointer position
            if (availablePlayers.length > 0) {
                const normalizedRotation = currentRotation % (2 * Math.PI);
                const topAngle = -Math.PI / 2;
                const adjustedTopAngle = (topAngle - normalizedRotation + 2 * Math.PI) % (2 * Math.PI);
                const topSegmentIndex = Math.floor(adjustedTopAngle / anglePerPlayer) % availablePlayers.length;
                
                // Highlight the selected segment
                const startAngle = topSegmentIndex * anglePerPlayer + currentRotation;
                const endAngle = startAngle + anglePerPlayer;
                
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius + 5, startAngle, endAngle);
                ctx.closePath();
                ctx.strokeStyle = '#FFD700';
                ctx.lineWidth = 4;
                ctx.stroke();
            }
        }

        function spinWheel() {
            if (isSpinning || availablePlayers.length === 0) return;
            
            isSpinning = true;
            document.getElementById('spinButton').disabled = true;
            
            // Add spinning animation to container
            document.querySelector('.wheel-container').classList.add('spinning');
            
            // Slow and deliberate spin
            const spinDuration = 8000 + Math.random() * 4000; // 8-12 seconds (slow)
            const spinRotations = 5 + Math.random() * 3; // 5-8 full rotations (moderate)
            const targetRotation = currentRotation + (spinRotations * 2 * Math.PI);
            
            const startTime = Date.now();
            
            // Add visual feedback
            const button = document.getElementById('spinButton');
            button.textContent = '🌀 جاري الدوران...';
            button.style.background = 'linear-gradient(45deg, #FF006E, #8338EC)';
            
            function animate() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / spinDuration, 1);
                
                // Gentle easing for slow, smooth spin
                const easeOut = 1 - Math.pow(1 - progress, 3); // Cubic easing (gentle)
                currentRotation = currentRotation + (targetRotation - currentRotation) * easeOut;
                
                drawWheel();
                
                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    isSpinning = false;
                    // Remove spinning animation
                    document.querySelector('.wheel-container').classList.remove('spinning');
                    button.textContent = 'دور العجلة';
                    button.style.background = '';
                    document.getElementById('spinButton').disabled = false;
                    selectWinner();
                }
            }
            
            animate();
        }

        function selectWinner() {
            if (availablePlayers.length === 0) return;
            
            // The pointer is at the TOP (12 o'clock position = angle 0 in canvas coordinates)
            const anglePerPlayer = (2 * Math.PI) / availablePlayers.length;
            
            // Get current rotation and normalize it
            const normalizedRotation = currentRotation % (2 * Math.PI);
            
            // Since the wheel rotates clockwise, and we want the segment at the top (angle 0)
            // We need to find which segment's center is closest to angle 0
            // Canvas coordinates: 0 angle is at 3 o'clock, but our pointer is at 12 o'clock (top)
            // So we need to adjust by -π/2 (90 degrees) to align with our pointer
            
            // The segment at the top will be the one where its center angle is closest to -π/2
            const topAngle = -Math.PI / 2; // Top position in canvas coordinates
            const adjustedTopAngle = (topAngle - normalizedRotation + 2 * Math.PI) % (2 * Math.PI);
            
            // Find which player is at this angle
            const winnerIndex = Math.floor(adjustedTopAngle / anglePerPlayer) % availablePlayers.length;
            
            const winner = availablePlayers[winnerIndex];
            
            // Show clear selection before removing
            showSelectionHighlight(winner, winnerIndex);
            
            setTimeout(() => {
                availablePlayers.splice(winnerIndex, 1);
                selectedPlayers.push(winner);
                
                // Add visual effect for selected player
                animateWinnerSelection(winner.name);
                
                showMessage(`🎯 تم اختيار ${winner.name}!`, 'success');
                
                // Check if we can create matches (every 4 players = 1 match)
                if (selectedPlayers.length % 4 === 0 && selectedPlayers.length >= 4) {
                    createMatchFromSelected();
                }
                
                drawWheel();
            }, 1000); // 1 second delay to show selection
        }

        function showSelectionHighlight(player, index) {
            // Create a big highlight effect
            const highlight = document.createElement('div');
            highlight.style.cssText = `
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                font-size: 4rem;
                font-weight: bold;
                color: ${player.color};
                text-shadow: 0 0 50px ${player.color};
                z-index: 3000;
                animation: selectionPulse 1s ease-out forwards;
                pointer-events: none;
                text-align: center;
            `;
            highlight.innerHTML = `
                <div>🎯</div>
                <div style="font-size: 3rem; margin-top: 20px;">${player.name}</div>
                <div style="font-size: 1.5rem; margin-top: 10px;">تم اختياره!</div>
            `;
            document.body.appendChild(highlight);
            
            setTimeout(() => highlight.remove(), 1000);
        }

        function createMatchFromSelected() {
            if (selectedPlayers.length < 4) return;
            
            const team1Player1 = selectedPlayers[selectedPlayers.length - 4];
            const team1Player2 = selectedPlayers[selectedPlayers.length - 3];
            const team2Player1 = selectedPlayers[selectedPlayers.length - 2];
            const team2Player2 = selectedPlayers[selectedPlayers.length - 1];
            
            const match = {
                id: Date.now(),
                team1: [team1Player1, team1Player2],
                team2: [team2Player1, team2Player2],
                winner: null,
                round: 'quarterFinal'
            };
            
            matches.push(match);
            updateMatchesList();
            
            // Check tournament readiness after each match
            checkTournamentReadiness();
            
            // Auto-create bracket for 16 players (8 matches)
            if (matches.length === 8 && players.length === 16) {
                createTournamentBracket();
            }
            // Auto-create bracket for 32 players (16 matches) 
            else if (matches.length === 16 && players.length === 32) {
                createTournamentBracket();
            }
        }

        function updateMatchesList() {
            const container = document.getElementById('matchesList');
            container.innerHTML = '';
            
            if (matches.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: #666;">لا توجد مباريات بعد</div>';
                return;
            }
            
            matches.forEach((match, index) => {
                const matchCard = document.createElement('div');
                matchCard.className = 'match-card';
                matchCard.style.animation = `slideIn 0.5s ease ${index * 0.1}s both`;
                matchCard.innerHTML = `
                    <div class="match-header">
                        <span>🏆 المباراة ${index + 1}</span>
                        ${match.winner ? '<span class="winner-badge">✅ تم تحديد الفائز</span>' : '<span class="pending-badge">⏳ في انتظار الفائز</span>'}
                    </div>
                    <div class="teams">
                        <div class="team ${match.winner === match.team1 ? 'winner' : ''}">
                            <div class="team-header">
                                <span class="team-color" style="color: ${match.team1[0].color}">●</span>
                                الفريق 1
                            </div>
                            <div class="team-players">
                                <div>${match.team1[0].name}</div>
                                <div>${match.team1[1].name}</div>
                            </div>
                        </div>
                        <div class="vs">⚔️</div>
                        <div class="team ${match.winner === match.team2 ? 'winner' : ''}">
                            <div class="team-header">
                                <span class="team-color" style="color: ${match.team2[0].color}">●</span>
                                الفريق 2
                            </div>
                            <div class="team-players">
                                <div>${match.team2[0].name}</div>
                                <div>${match.team2[1].name}</div>
                            </div>
                        </div>
                    </div>
                    ${match.winner ? `
                        <div class="match-winner">
                            🏆 الفائز: ${match.winner[0].name} + ${match.winner[1].name}
                        </div>
                    ` : ''}
                `;
                container.appendChild(matchCard);
            });
        }

        function createTournamentBracket() {
            const bracket = document.getElementById('tournamentBracket');
            const container = document.getElementById('bracketContainer');
            
            bracket.style.display = 'block';
            container.innerHTML = '';
            
            const is16PlayerTournament = players.length === 16;
            const totalMatches = is16PlayerTournament ? 8 : 16;
            const quarterFinalMatches = is16PlayerTournament ? 8 : 16;
            const semiFinalMatches = is16PlayerTournament ? 4 : 8;
            
            // Quarter Finals
            const quarterFinals = document.createElement('div');
            quarterFinals.className = 'bracket-round';
            quarterFinals.innerHTML = `<h3 class="round-title">الدور الأول (${quarterFinalMatches} مباريات)</h3>`;
            
            for (let i = 0; i < Math.min(matches.length, quarterFinalMatches); i++) {
                const matchDiv = document.createElement('div');
                matchDiv.className = 'bracket-match';
                matchDiv.innerHTML = `
                    <div class="match-header">المباراة ${i + 1}</div>
                    <div class="match-teams">
                        <div class="bracket-team">
                            <span class="team-color" style="color: ${matches[i].team1[0].color}">●</span>
                            ${matches[i].team1[0].name} + ${matches[i].team1[1].name}
                        </div>
                        <div class="bracket-vs">VS</div>
                        <div class="bracket-team">
                            <span class="team-color" style="color: ${matches[i].team2[0].color}">●</span>
                            ${matches[i].team2[0].name} + ${matches[i].team2[1].name}
                        </div>
                    </div>
                    <button class="winner-btn" onclick="setQuarterFinalWinner(${i}, 1)" style="background: ${matches[i].team1[0].color}">
                        فريق 1 يفوز
                    </button>
                    <button class="winner-btn" onclick="setQuarterFinalWinner(${i}, 2)" style="background: ${matches[i].team2[0].color}">
                        فريق 2 يفوز
                    </button>
                `;
                quarterFinals.appendChild(matchDiv);
            }
            
            // Semi Finals
            const semiFinals = document.createElement('div');
            semiFinals.className = 'bracket-round';
            semiFinals.innerHTML = `<h3 class="round-title">نصف النهائي (${semiFinalMatches} مباريات)</h3>`;
            
            for (let i = 0; i < semiFinalMatches; i++) {
                const matchDiv = document.createElement('div');
                matchDiv.className = 'bracket-match semi-final-placeholder';
                matchDiv.id = `semi-final-${i}`;
                matchDiv.innerHTML = `
                    <div class="match-header">نصف النهائي ${i + 1}</div>
                    <div class="winner-placeholder">في انتظار الفائزين...</div>
                `;
                semiFinals.appendChild(matchDiv);
            }
            
            // Final
            const final = document.createElement('div');
            final.className = 'bracket-round';
            final.innerHTML = '<h3 class="round-title">النهائي</h3>';
            
            const finalMatch = document.createElement('div');
            finalMatch.className = 'bracket-match final-placeholder';
            finalMatch.id = 'final-match';
            finalMatch.innerHTML = `
                <div class="match-header">🏆 المباراة النهائية 🏆</div>
                <div class="winner-placeholder">في انتظار الفائزين...</div>
            `;
            final.appendChild(finalMatch);
            
            container.appendChild(quarterFinals);
            container.appendChild(semiFinals);
            container.appendChild(final);
            
            showMessage(`تم إنشاء شجرة بطولة ${is16PlayerTournament ? '16' : '32'} لاعب! اختر الفائزين في الدور الأول`, 'success');
        }

        // Utility Functions
        function getRandomColor() {
            const colors = [
                '#FF006E', '#FB5607', '#FFBE0B', '#8338EC', '#3A86FF',
                '#06FFB4', '#FF4365', '#00D9FF', '#FFD23F', '#FF1B6B'
            ];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        function animateWinnerSelection(playerName) {
            // Create floating winner animation
            const winnerDiv = document.createElement('div');
            winnerDiv.style.cssText = `
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                font-size: 3rem;
                font-weight: bold;
                color: #00FF88;
                text-shadow: 0 0 30px #00FF88;
                z-index: 2000;
                animation: winnerPop 2s ease-out forwards;
                pointer-events: none;
            `;
            winnerDiv.textContent = playerName;
            document.body.appendChild(winnerDiv);
            
            setTimeout(() => winnerDiv.remove(), 2000);
        }

        function setQuarterFinalWinner(matchIndex, teamNumber) {
            const match = matches[matchIndex];
            const winner = teamNumber === 1 ? match.team1 : match.team2;
            match.winner = winner;
            tournamentWinners.quarterFinals.push(winner);
            
            // Update semi finals
            updateSemiFinals();
            
            // Animate winner
            animateWinnerSelection(`فريق ${teamNumber} يفوز!`);
            showMessage(`تم تحديد الفائز في المباراة ${matchIndex + 1}`, 'success');
        }

        function updateSemiFinals() {
            if (tournamentWinners.quarterFinals.length === 4) {
                // Update semi final 1
                const semi1 = document.getElementById('semi-final-0');
                semi1.innerHTML = `
                    <div class="match-header">نصف النهائي 1</div>
                    <div class="match-teams">
                        <div class="bracket-team">
                            <span class="team-color" style="color: ${tournamentWinners.quarterFinals[0][0].color}">●</span>
                            ${tournamentWinners.quarterFinals[0][0].name} + ${tournamentWinners.quarterFinals[0][1].name}
                        </div>
                        <div class="bracket-vs">VS</div>
                        <div class="bracket-team">
                            <span class="team-color" style="color: ${tournamentWinners.quarterFinals[1][0].color}">●</span>
                            ${tournamentWinners.quarterFinals[1][0].name} + ${tournamentWinners.quarterFinals[1][1].name}
                        </div>
                    </div>
                    <button class="winner-btn" onclick="setSemiFinalWinner(0, 1)" style="background: ${tournamentWinners.quarterFinals[0][0].color}">
                        فريق 1 يفوز
                    </button>
                    <button class="winner-btn" onclick="setSemiFinalWinner(0, 2)" style="background: ${tournamentWinners.quarterFinals[1][0].color}">
                        فريق 2 يفوز
                    </button>
                `;
                
                // Update semi final 2
                const semi2 = document.getElementById('semi-final-1');
                semi2.innerHTML = `
                    <div class="match-header">نصف النهائي 2</div>
                    <div class="match-teams">
                        <div class="bracket-team">
                            <span class="team-color" style="color: ${tournamentWinners.quarterFinals[2][0].color}">●</span>
                            ${tournamentWinners.quarterFinals[2][0].name} + ${tournamentWinners.quarterFinals[2][1].name}
                        </div>
                        <div class="bracket-vs">VS</div>
                        <div class="bracket-team">
                            <span class="team-color" style="color: ${tournamentWinners.quarterFinals[3][0].color}">●</span>
                            ${tournamentWinners.quarterFinals[3][0].name} + ${tournamentWinners.quarterFinals[3][1].name}
                        </div>
                    </div>
                    <button class="winner-btn" onclick="setSemiFinalWinner(1, 1)" style="background: ${tournamentWinners.quarterFinals[2][0].color}">
                        فريق 1 يفوز
                    </button>
                    <button class="winner-btn" onclick="setSemiFinalWinner(1, 2)" style="background: ${tournamentWinners.quarterFinals[3][0].color}">
                        فريق 2 يفوز
                    </button>
                `;
            }
        }

        function setSemiFinalWinner(semiIndex, teamNumber) {
            const winnerIndex = semiIndex === 0 ? (teamNumber === 1 ? 0 : 1) : (teamNumber === 1 ? 2 : 3);
            const winner = tournamentWinners.quarterFinals[winnerIndex];
            tournamentWinners.semiFinals.push(winner);
            
            // Update final
            updateFinal();
            
            animateWinnerSelection(`الفائز نصف النهائي ${semiIndex + 1}!`);
            showMessage(`تم تحديد الفائز في نصف النهائي ${semiIndex + 1}`, 'success');
        }

        function updateFinal() {
            if (tournamentWinners.semiFinals.length === 2) {
                const final = document.getElementById('final-match');
                final.innerHTML = `
                    <div class="match-header">🏆 المباراة النهائية 🏆</div>
                    <div class="match-teams">
                        <div class="bracket-team">
                            <span class="team-color" style="color: ${tournamentWinners.semiFinals[0][0].color}">●</span>
                            ${tournamentWinners.semiFinals[0][0].name} + ${tournamentWinners.semiFinals[0][1].name}
                        </div>
                        <div class="bracket-vs">VS</div>
                        <div class="bracket-team">
                            <span class="team-color" style="color: ${tournamentWinners.semiFinals[1][0].color}">●</span>
                            ${tournamentWinners.semiFinals[1][0].name} + ${tournamentWinners.semiFinals[1][1].name}
                        </div>
                    </div>
                    <button class="winner-btn champion-btn" onclick="setChampion(1)" style="background: ${tournamentWinners.semiFinals[0][0].color}">
                        🏆 فريق 1 يفوز 🏆
                    </button>
                    <button class="winner-btn champion-btn" onclick="setChampion(2)" style="background: ${tournamentWinners.semiFinals[1][0].color}">
                        🏆 فريق 2 يفوز 🏆
                    </button>
                `;
            }
        }

        function setChampion(teamNumber) {
            const champion = teamNumber === 1 ? tournamentWinners.semiFinals[0] : tournamentWinners.semiFinals[1];
            tournamentWinners.final = champion;
            
            // Show champion celebration
            showChampionCelebration(champion);
            showMessage('🏆 تم تحديد بطل البطولة! 🏆', 'success');
        }

        function showChampionCelebration(champion) {
            const celebration = document.createElement('div');
            celebration.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0, 0, 0, 0.9);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 3000;
                animation: fadeIn 0.5s ease;
            `;
            
            celebration.innerHTML = `
                <div style="text-align: center; animation: championBounce 1s ease infinite alternate;">
                    <div style="font-size: 4rem; margin-bottom: 20px;">🏆</div>
                    <h1 style="color: #FFD700; font-size: 3rem; text-shadow: 0 0 30px #FFD700; margin: 0;">
                        البطل!
                    </h1>
                    <div style="color: #fff; font-size: 2rem; margin-top: 20px;">
                        <span style="color: ${champion[0].color}">●</span>
                        ${champion[0].name} + ${champion[1].name}
                    </div>
                    <button onclick="this.parentElement.parentElement.remove()" style="
                        margin-top: 30px;
                        padding: 15px 30px;
                        font-size: 1.2rem;
                        background: linear-gradient(45deg, #FFD700, #FFA500);
                        border: none;
                        border-radius: 10px;
                        color: #000;
                        font-weight: bold;
                        cursor: pointer;
                    ">
                        إغلاق
                    </button>
                </div>
            `;
            
            document.body.appendChild(celebration);
        }

        function showMessage(message, type) {
            // Create a simple toast notification
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                top: 20px;
                left: 50%;
                transform: translateX(-50%);
                padding: 15px 25px;
                background: ${type === 'error' ? '#FF006E' : type === 'success' ? '#00FF88' : '#00D9FF'};
                color: #000;
                border-radius: 8px;
                font-weight: bold;
                z-index: 1000;
                animation: slideDown 0.3s ease;
                box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'slideUp 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Add slide animations
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideDown {
                from { transform: translate(-50%, -100%); opacity: 0; }
                to { transform: translate(-50%, 0); opacity: 1; }
            }
            @keyframes slideUp {
                from { transform: translate(-50%, 0); opacity: 1; }
                to { transform: translate(-50%, -100%); opacity: 0; }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
