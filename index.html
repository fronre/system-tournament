<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بطولة الأسطورة و اونانا</title>
    
    <!-- Professional Gaming Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Cairo:wght@600;800;900&family=Orbitron:wght@700;900&family=Bebas+Neue&family=Russo+One&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #1a1a2e;
            --bg-card: #16213e;
            --neon-cyan: #00ffff;
            --neon-purple: #ff00ff;
            --neon-pink: #ff006e;
            --neon-green: #00ff88;
            --neon-red: #ff3366;
            --neon-orange: #ff8800;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --text-muted: #666666;
            --shadow-neon: 0 0 20px rgba(0, 255, 255, 0.5);
            --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.3);
            --font-primary: 'Orbitron', 'Russo One', 'Segoe UI', monospace;
            --font-secondary: 'Tajawal', 'Cairo', sans-serif;
            --font-bold: 'Cairo', 'Tajawal', sans-serif;
        }

        body {
            font-family: var(--font-secondary);
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Header */
        header {
            background: linear-gradient(90deg, var(--bg-card), var(--bg-secondary), var(--bg-card));
            padding: 15px 20px;
            text-align: center;
            border-bottom: 2px solid var(--neon-cyan);
            box-shadow: var(--shadow-neon);
            position: relative;
            overflow: hidden;
            height: 80px;
            display: flex;
            align-items: center;
        }

        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
            animation: slideHeader 3s infinite;
        }

        @keyframes slideHeader {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .header-content {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
        }

        .logo {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.8);
            animation: pulse 2s infinite;
            border: 2px solid var(--neon-cyan);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        h1 {
            font-family: var(--font-primary);
            font-size: 2.8rem;
            font-weight: 900;
            background: linear-gradient(45deg, var(--neon-cyan), var(--neon-purple), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px rgba(0, 255, 255, 0.8);
            animation: glow 2s ease-in-out infinite alternate;
            letter-spacing: 4px;
            text-transform: uppercase;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.5));
        }

        @keyframes glow {
            from { filter: brightness(1); }
            to { filter: brightness(1.2); }
        }

        /* Main Layout - Full Screen Grid */
        main {
            height: calc(100vh - 80px);
            display: grid;
            grid-template-columns: 1fr 1.3fr 1fr;
            gap: 20px;
            padding: 20px;
            background: radial-gradient(circle at center, rgba(0, 255, 255, 0.03) 0%, transparent 70%);
            overflow: hidden;
        }

        /* Cards - Professional eSports Style */
        .card {
            background: linear-gradient(135deg, rgba(22, 33, 62, 0.9), rgba(26, 26, 46, 0.9));
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(0, 255, 255, 0.2);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple), var(--neon-pink));
            animation: slideTop 3s linear infinite;
        }

        @keyframes slideTop {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 50px rgba(0, 255, 255, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            border-color: var(--neon-cyan);
        }

        .card h2 {
            font-family: var(--font-bold);
            color: var(--neon-cyan);
            margin-bottom: 20px;
            font-size: 1.6rem;
            font-weight: 800;
            text-align: center;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.9);
            letter-spacing: 3px;
            text-transform: uppercase;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
        }

        /* Players Section - Professional Player Cards */
        .player-input {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 14px 18px;
            background: rgba(26, 26, 46, 0.9);
            border: 2px solid rgba(0, 255, 255, 0.4);
            border-radius: 10px;
            color: var(--text-primary);
            font-family: var(--font-secondary);
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
        }

        button {
            padding: 14px 24px;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
            border: none;
            border-radius: 10px;
            color: var(--text-primary);
            font-family: var(--font-bold);
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0, 255, 255, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 255, 255, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        .players-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            overflow-y: auto;
            flex: 1;
            padding: 8px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
        }

        .player-chip {
            background: linear-gradient(135deg, rgba(22, 33, 62, 0.9), rgba(26, 26, 46, 0.9));
            border: 1px solid rgba(0, 255, 255, 0.3);
            padding: 10px 12px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            animation: fadeIn 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 255, 255, 0.2);
            font-size: 12px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            min-height: 80px;
            justify-content: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        .player-chip:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 255, 255, 0.4);
            border-color: var(--neon-cyan);
        }

        .remove-player {
            background: var(--neon-red);
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 10px;
            font-weight: bold;
            transition: all 0.3s ease;
            position: absolute;
            top: 4px;
            right: 4px;
            box-shadow: 0 2px 8px rgba(255, 51, 102, 0.4);
        }

        .remove-player:hover {
            background: #ff0044;
            transform: scale(1.1);
            box-shadow: 0 4px 12px rgba(255, 51, 102, 0.6);
        }

        /* Wheel Section */
        .wheel-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            flex: 1;
            justify-content: center;
            min-height: 650px;
            padding: 20px;
            background: radial-gradient(circle at center, rgba(255, 215, 0, 0.05) 0%, transparent 60%);
            border-radius: 20px;
        }

        #wheelCanvas {
            border: 3px solid var(--neon-cyan);
            border-radius: 50%;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.5);
            background: var(--bg-primary);
            max-width: 480px;
            max-height: 480px;
            width: 480px;
            height: 480px;
            position: relative;
            z-index: 100;
        }

        .wheel-container.spinning #wheelCanvas {
            transform: scale(1.1);
            box-shadow: 0 0 80px rgba(0, 255, 255, 0.8);
            border-color: #FFD700;
            animation: wheelGlow 0.5s ease-in-out infinite alternate;
        }

        @keyframes wheelGlow {
            0% { 
                box-shadow: 0 0 80px rgba(0, 255, 255, 0.8);
                transform: scale(1.1);
            }
            100% { 
                box-shadow: 0 0 120px rgba(255, 215, 0, 0.9);
                transform: scale(1.15);
            }
        }

        .wheel-pointer {
            width: 0;
            height: 0;
            border-left: 25px solid transparent;
            border-right: 25px solid transparent;
            border-top: 50px solid var(--neon-pink);
            position: relative;
            top: -25px;
            filter: drop-shadow(0 0 15px var(--neon-pink));
            animation: bounce 2s infinite, pointerGlow 1s ease-in-out infinite alternate;
            z-index: 101;
        }

        /* Add a clear target indicator */
        .wheel-pointer::before {
            content: '';
            position: absolute;
            top: -60px;
            left: -15px;
            width: 30px;
            height: 30px;
            background: var(--neon-pink);
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 0 20px var(--neon-pink);
            animation: pulse 1s infinite;
        }

        .wheel-container.spinning .wheel-pointer {
            border-top-color: #FFD700;
            filter: drop-shadow(0 0 30px #FFD700);
            animation: bounce 0.5s infinite, pointerSpinGlow 0.3s ease-in-out infinite alternate;
        }

        .wheel-container.spinning .wheel-pointer::before {
            background: #FFD700;
            box-shadow: 0 0 30px #FFD700;
            animation: pulse 0.5s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes pointerGlow {
            0% { filter: drop-shadow(0 0 15px var(--neon-pink)); }
            100% { filter: drop-shadow(0 0 30px var(--neon-pink)); }
        }

        @keyframes pointerSpinGlow {
            0% { filter: drop-shadow(0 0 30px #FFD700); }
            100% { filter: drop-shadow(0 0 50px #FFD700); }
        }

        .spin-button {
            background: linear-gradient(135deg, var(--neon-green), var(--neon-cyan));
            padding: 18px 45px;
            font-family: var(--font-bold);
            font-size: 18px;
            font-weight: 800;
            box-shadow: 0 8px 30px rgba(0, 255, 136, 0.6);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 3px;
            border: 3px solid rgba(0, 255, 255, 0.4);
            border-radius: 12px;
            display: block !important;
            visibility: visible !important;
            opacity: 1 !important;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.3));
        }

        .spin-button:hover:not(:disabled) {
            box-shadow: 0 0 40px rgba(0, 255, 136, 0.8);
            transform: scale(1.05);
        }

        .spin-button:disabled {
            cursor: not-allowed;
            opacity: 0.8;
        }

        /* Matches Section */
        .matches-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-height: 400px;
            overflow-y: auto;
            flex: 1;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
        }

        .match-card {
            background: linear-gradient(135deg, var(--bg-secondary), var(--bg-card));
            border: 1px solid var(--neon-purple);
            border-radius: 12px;
            padding: 18px;
            text-align: center;
            animation: slideIn 0.5s ease;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 0, 255, 0.2);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .match-card:hover {
            transform: translateX(-5px);
            box-shadow: 0 5px 20px rgba(255, 0, 255, 0.4);
            border-color: var(--neon-purple);
        }

        .teams {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0;
        }

        .team {
            background: var(--bg-primary);
            padding: 8px 12px;
            border-radius: 5px;
            border: 1px solid var(--neon-cyan);
            flex: 1;
            margin: 0 5px;
        }

        .vs {
            color: var(--neon-pink);
            font-weight: bold;
            font-size: 18px;
            text-shadow: 0 0 10px var(--neon-pink);
        }

        /* Tournament Bracket - Professional eSports Style */
        .tournament-bracket {
            background: linear-gradient(135deg, rgba(22, 33, 62, 0.95), rgba(26, 26, 46, 0.95));
            border-radius: 16px;
            padding: 30px;
            margin-top: 20px;
            border: 1px solid rgba(0, 255, 255, 0.2);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            overflow-x: auto;
            backdrop-filter: blur(10px);
        }

        .bracket-title {
            font-family: var(--font-primary);
            color: var(--neon-green);
            text-align: center;
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 25px;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.8);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .bracket-container {
            display: flex;
            gap: 40px;
            justify-content: center;
            align-items: flex-start;
            overflow-x: auto;
            padding: 20px 0;
            min-height: 300px;
        }

        .bracket-round {
            text-align: center;
            min-width: 200px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .round-title {
            font-family: var(--font-primary);
            color: var(--neon-cyan);
            margin-bottom: 20px;
            font-size: 1.1rem;
            font-weight: 600;
            position: sticky;
            top: 0;
            background: rgba(22, 33, 62, 0.9);
            padding: 10px;
            border-radius: 8px;
            z-index: 10;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid rgba(0, 255, 255, 0.2);
        }

        .bracket-match {
            background: linear-gradient(135deg, rgba(26, 26, 46, 0.8), rgba(22, 33, 62, 0.8));
            border: 1px solid rgba(255, 0, 255, 0.3);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            width: 100%;
            max-width: 220px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-sizing: border-box;
            box-shadow: 0 4px 15px rgba(255, 0, 255, 0.2);
        }

        .bracket-match:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 0, 255, 0.4);
            border-color: var(--neon-purple);
        }

        .match-header {
            font-family: var(--font-primary);
            color: var(--neon-cyan);
            font-weight: 600;
            margin-bottom: 12px;
            text-align: center;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .match-teams {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 10px;
        }

        .bracket-team {
            background: rgba(10, 10, 15, 0.8);
            padding: 8px 10px;
            border-radius: 6px;
            border: 1px solid rgba(0, 255, 255, 0.2);
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 5px;
            font-family: var(--font-secondary);
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .team-color {
            font-size: 14px;
            font-weight: bold;
        }

        .bracket-vs {
            color: var(--neon-pink);
            font-weight: 700;
            text-align: center;
            font-size: 12px;
            text-shadow: 0 0 8px var(--neon-pink);
            font-family: var(--font-primary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .winner-btn {
            width: 100%;
            padding: 8px 12px;
            margin-top: 8px;
            border: none;
            border-radius: 6px;
            color: white;
            font-family: var(--font-primary);
            font-weight: 600;
            font-size: 10px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 2px 8px rgba(0, 255, 136, 0.3);
        }

        .winner-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 255, 136, 0.6);
        }

        .champion-btn {
            background: linear-gradient(45deg, #FFD700, #FFA500) !important;
            font-size: 14px;
            padding: 12px;
            animation: championGlow 2s ease-in-out infinite alternate;
        }

        .winner-placeholder {
            color: var(--text-secondary);
            font-style: italic;
            text-align: center;
            padding: 20px 0;
        }

        /* Winner Animations */
        @keyframes winnerPop {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 0;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0;
            }
        }

        @keyframes championBounce {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }

        @keyframes championGlow {
            0% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.6); }
            100% { box-shadow: 0 0 40px rgba(255, 215, 0, 0.9); }
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--neon-cyan);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--neon-purple);
        }

        /* Professional Responsive Design */
        @media (max-width: 1400px) {
            main {
                grid-template-columns: 1fr 1.2fr 1fr;
                gap: 15px;
                padding: 15px;
            }
            
            h1 {
                font-size: 2.2rem;
            }
        }

        @media (max-width: 1200px) {
            main {
                grid-template-columns: 1fr 1fr;
                gap: 15px;
                padding: 15px;
            }

            .bracket-container {
                flex-direction: column;
                align-items: center;
                gap: 20px;
            }
            
            .tournament-bracket {
                grid-column: 1 / -1;
            }
        }

        @media (max-width: 1024px) {
            main {
                grid-template-columns: 1fr;
                gap: 15px;
                padding: 15px;
                height: calc(100vh - 80px);
                overflow-y: auto;
            }

            h1 {
                font-size: 2rem;
            }

            .card {
                padding: 20px;
                min-height: auto;
            }

            #wheelCanvas {
                width: 350px !important;
                height: 350px !important;
            }

            .bracket-container {
                flex-direction: column;
                align-items: center;
                gap: 20px;
                min-height: auto;
            }

            .bracket-round {
                width: 100%;
                max-width: 300px;
            }
        }

        @media (max-width: 768px) {
            header {
                height: auto;
                padding: 10px 15px;
            }

            .header-content {
                flex-direction: column;
                gap: 10px;
            }

            h1 {
                font-size: 1.6rem;
            }

            .card {
                padding: 15px;
            }

            #wheelCanvas {
                width: 300px !important;
                height: 300px !important;
            }

            .players-list {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            }

            .bracket-container {
                gap: 15px;
            }

            .bracket-match {
                max-width: 100%;
            }
        }

        @media (max-width: 480px) {
            header {
                padding: 10px;
            }

            main {
                padding: 10px;
                gap: 10px;
            }

            .card {
                padding: 12px;
            }

            h1 {
                font-size: 1.3rem;
            }

            h2 {
                font-size: 1.1rem;
            }

            #wheelCanvas {
                width: 250px !important;
                height: 250px !important;
            }

            .spin-button { font-size: 18px !important; padding: 16px 40px !important; margin-top: 20px !important; background: linear-gradient(135deg, #00ff88, #00ffff) !important; border: 3px solid #00ffff !important; box-shadow: 0 0 30px rgba(0, 255, 255, 0.8) !important; display: block !important;
                padding: 12px 20px;
                font-size: 14px;
            }

            .tournament-bracket {
                padding: 15px;
            }

            .bracket-container {
                padding: 10px 0;
            }
            
            .players-list {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
                gap: 8px;
            }
        }

        /* Loading Animation */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;

    <script>

        function removePlayer(playerId) {
            const player = players.find(p => p.id === playerId);
            players = players.filter(p => p.id !== playerId);
            availablePlayers = availablePlayers.filter(p => p.id !== playerId);
            updatePlayersList();

        function checkTournamentReadiness() {
            const totalPlayers = players.length;
            const selectedCount = selectedPlayers.length;
            const availableCount = availablePlayers.length;
            
            // Show progress indicator

                if (matches.length >= 4 && totalPlayers === 16) {

        function updatePlayersList() {

            players.forEach(player => {

        // Wheel Functions
        function drawWheel() {
            const canvas = document.getElementById('wheelCanvas');
            const ctx = canvas.getContext('2d');
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = 200; // Optimized for better visibility
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (availablePlayers.length === 0) {
                ctx.fillStyle = '#666';
                ctx.font = '20px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('لا يوجد لاعبون متاحون', centerX, centerY);
                return;
            }
            
            const anglePerPlayer = (2 * Math.PI) / availablePlayers.length;
            
            availablePlayers.forEach((player, index) => {
                const startAngle = index * anglePerPlayer + currentRotation;
                const endAngle = startAngle + anglePerPlayer;
                
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.closePath();
                ctx.fillStyle = player.color;
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 3;
                ctx.stroke();
                
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(startAngle + anglePerPlayer / 2);
                // Enhanced text rendering with better font
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 20px "Orbitron", Arial, sans-serif';
                ctx.shadowColor = 'rgba(0, 0, 0, 0.9)';
                ctx.shadowBlur = 6;
                ctx.shadowOffsetX = 2;
                ctx.shadowOffsetY = 2;
                
                // Draw text with strong outline for maximum readability
                ctx.strokeStyle = 'rgba(0, 0, 0, 0.95)';
                ctx.lineWidth = 4;
                ctx.strokeText(player.name, radius / 2.2, 0);
                ctx.fillText(player.name, radius / 2.2, 0);
                
                // Add glow effect for better visibility
                ctx.shadowColor = player.color;
                ctx.shadowBlur = 8;
                ctx.strokeStyle = player.color;
                ctx.lineWidth = 1;
                ctx.strokeText(player.name, radius / 2.2, 0);
                
                // Reset shadow
                ctx.shadowColor = 'transparent';
                ctx.shadowBlur = 0;
                ctx.shadowOffsetX = 0;
                ctx.shadowOffsetY = 0;
                ctx.restore();
            });
            
            // Draw beautiful center circle
            ctx.beginPath();
            ctx.arc(centerX, centerY, 35, 0, 2 * Math.PI);
            ctx.fillStyle = '#fff';
            ctx.fill();
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 3;
            ctx.stroke();
            
            // Draw beautiful selection indicator with gradient
            ctx.beginPath();
            ctx.moveTo(centerX, centerY - radius);
            ctx.lineTo(centerX, centerY - radius - 30);
            
            const gradient = ctx.createLinearGradient(centerX, centerY - radius, centerX, centerY - radius - 30);
            gradient.addColorStop(0, '#FFD700');
            gradient.addColorStop(1, '#FFA500');
            
            ctx.strokeStyle = gradient;
            ctx.lineWidth = 6;
            ctx.lineCap = 'round';
            ctx.shadowColor = '#FFD700';
            ctx.shadowBlur = 15;
            ctx.stroke();
            
            // Add decorative elements
            ctx.beginPath();
            ctx.arc(centerX, centerY - radius - 35, 5, 0, 2 * Math.PI);
            ctx.fillStyle = '#FFD700';
            ctx.shadowColor = '#FFD700';
            ctx.shadowBlur = 20;
            ctx.fill();
            
            // Highlight segment at the pointer position
            if (availablePlayers.length > 0) {
                const normalizedRotation = currentRotation % (2 * Math.PI);
                const topAngle = -Math.PI / 2;
                const adjustedTopAngle = (topAngle - normalizedRotation + 2 * Math.PI) % (2 * Math.PI);
                const topSegmentIndex = Math.floor(adjustedTopAngle / anglePerPlayer) % availablePlayers.length;
                
                const startAngle = topSegmentIndex * anglePerPlayer + currentRotation;
                const endAngle = startAngle + anglePerPlayer;
                
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius + 8, startAngle, endAngle);
                ctx.closePath();
                ctx.strokeStyle = '#FFD700';
                ctx.lineWidth = 5;
                ctx.shadowColor = '#FFD700';
                ctx.shadowBlur = 20;
                ctx.stroke();
            }
        }

        function spinWheel() {
            if (isSpinning || availablePlayers.length === 0) {
                if (availablePlayers.length === 0) {
                    showMessage('الرجاء إضافة لاعبين أولاً', 'error');
                }
                return;
            }

            isSpinning = true;
            const button = document.getElementById('spinButton');
            button.disabled = true;
            button.textContent = "جاري التدوير...";
            button.style.background = "linear-gradient(135deg, #FFD700, #FFA500, #FF6347)";

            document.querySelector('.wheel-container').classList.add('spinning');

            const spinDuration = 5000;
            const spins = 8 + Math.random() * 6;
            const startRotation = currentRotation;
            const targetRotation = startRotation + spins * 2 * Math.PI;
            const startTime = performance.now();

            function easeOutQuart(t) {
                return 1 - Math.pow(1 - t, 4);
            }

            function animate(time) {
                const progress = Math.min((time - startTime) / spinDuration, 1);
                const eased = easeOutQuart(progress);
                currentRotation = startRotation + (targetRotation - startRotation) * eased;
                drawWheel();

                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    isSpinning = false;
                    document.querySelector('.wheel-container').classList.remove('spinning');
                    button.disabled = false;
                    button.textContent = "🎡 تدوير العجلة";
                    button.style.background = "";
                    selectWinner();
                }
            }

            requestAnimationFrame(animate);
        }

        function selectWinner() {
            if (availablePlayers.length === 0) return;
            
            // The pointer is at the TOP (12 o'clock position = angle 0 in canvas coordinates)
            const anglePerPlayer = (2 * Math.PI) / availablePlayers.length;
            
            // Get current rotation and normalize it
            const normalizedRotation = currentRotation % (2 * Math.PI);
            
            // Since the wheel rotates clockwise, and we want the segment at the top (angle 0)
            // We need to find which segment's center is closest to angle 0
            // Canvas coordinates: 0 angle is at 3 o'clock, but our pointer is at 12 o'clock (top)
            // So we need to adjust by -p/2 (90 degrees) to align with our pointer
            
            // The segment at the top will be the one where its center angle is closest to -p/2
            const topAngle = -Math.PI / 2; // Top position in canvas coordinates
            const adjustedTopAngle = (topAngle - normalizedRotation + 2 * Math.PI) % (2 * Math.PI);
            
            // Find which player is at this angle
            const winnerIndex = Math.floor(adjustedTopAngle / anglePerPlayer) % availablePlayers.length;
            
            const winner = availablePlayers[winnerIndex];
            
            // Show clear selection before removing
            showSelectionHighlight(winner, winnerIndex);
            
            setTimeout(() => {
                availablePlayers.splice(winnerIndex, 1);
                selectedPlayers.push(winner);
                
                // Add visual effect for selected player
                animateWinnerSelection(winner.name);
                
                showMessage(`?? ?? ?????? ${winner.name}!`, 'success');
                
                // Check if we can create matches (every 4 players = 1 match)
                if (selectedPlayers.length % 4 === 0 && selectedPlayers.length >= 4) {
                    createMatchFromSelected();
                }
                
                // Update status after selection
                checkTournamentReadiness();
                updatePlayersList();
                
                drawWheel();
            }, 3000); // 3 seconds delay to show selection clearly
        }

            selectionCard.innerHTML = `

                    <div style="width: 60px; height: 60px; background: linear-gradient(45deg, #FFD700, #FFA500); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; box-shadow: 0 0 20px #FFD700;">??</div>

            document.body.appendChild(selectionCard);
            
            // Add professional particle effects

        function createProfessionalParticles(color) {
            for (let i = 0; i < 30; i++) {

        function createParticleEffect(container) {
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');

                // Create custom animation for each particle

            container.innerHTML = '';
            
            const is16PlayerTournament = players.length === 16;
            const totalMatches = is16PlayerTournament ? 8 : 16;
            const quarterFinalMatches = is16PlayerTournament ? 8 : 16;
            const semiFinalMatches = is16PlayerTournament ? 4 : 8;
            
            // Quarter Finals
            const quarterFinals = document.createElement('div');
            quarterFinals.className = 'bracket-round';
            quarterFinals.innerHTML = `<h3 class="round-title">????? ????? (${quarterFinalMatches} ???????)</h3>`;
            
            for (let i = 0; i < Math.min(matches.length, quarterFinalMatches); i++) {
                const matchDiv = document.createElement('div');
                matchDiv.className = 'bracket-match';
                matchDiv.innerHTML = `
                    <div class="match-header">???????? ${i + 1}</div>
                    <div class="match-teams">
                        <div class="bracket-team">
                            <span class="team-color" style="color: ${matches[i].team1[0].color}">?</span>
                            ${matches[i].team1[0].name} + ${matches[i].team1[1].name}
                        </div>
                        <div class="bracket-vs">VS</div>
                        <div class="bracket-team">
                            <span class="team-color" style="color: ${matches[i].team2[0].color}">?</span>
                            ${matches[i].team2[0].name} + ${matches[i].team2[1].name}
                        </div>
                    </div>
                    <button class="winner-btn" onclick="setQuarterFinalWinner(${i}, 1)" style="background: ${matches[i].team1[0].color}">
                        ???? 1 ????
                    </button>
                    <button class="winner-btn" onclick="setQuarterFinalWinner(${i}, 2)" style="background: ${matches[i].team2[0].color}">
                        ???? 2 ????
                    </button>
                `;
                quarterFinals.appendChild(matchDiv);
            }
            
            // Semi Finals
            const semiFinals = document.createElement('div');
            semiFinals.className = 'bracket-round';
            semiFinals.innerHTML = `<h3 class="round-title">??? ??????? (${semiFinalMatches} ???????)</h3>`;
            
            for (let i = 0; i < semiFinalMatches; i++) {
                const matchDiv = document.createElement('div');
                matchDiv.className = 'bracket-match semi-final-placeholder';
                matchDiv.id = `semi-final-${i}`;
                matchDiv.innerHTML = `
                    <div class="match-header">??? ??????? ${i + 1}</div>
                    <div class="winner-placeholder">?? ?????? ????????...</div>
                `;
                semiFinals.appendChild(matchDiv);
            }
            
            // Final
            const final = document.createElement('div');
            final.className = 'bracket-round';
            final.innerHTML = '<h3 class="round-title">???????</h3>';
            
            const finalMatch = document.createElement('div');
            finalMatch.className = 'bracket-match final-placeholder';
            finalMatch.id = 'final-match';
            finalMatch.innerHTML = `
                <div class="match-header">?? ???????? ???????? ??</div>
                <div class="winner-placeholder">?? ?????? ????????...</div>
            `;
            final.appendChild(finalMatch);
            
            container.appendChild(quarterFinals);
            container.appendChild(semiFinals);
            container.appendChild(final);
            
            showMessage(`?? ????? ???? ????? ${is16PlayerTournament ? '16' : '32'} ????! ???? ???????? ?? ????? ?????`, 'success');
        }

        // Utility Functions
        function getRandomColor() {
            const colors = [
                '#FF006E', '#FB5607', '#FFBE0B', '#8338EC', '#3A86FF',
                '#06FFB4', '#FF4365', '#00D9FF', '#FFD23F', '#FF1B6B'
            ];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        function animateWinnerSelection(playerName) {
            // Create floating winner animation
            const winnerDiv = document.createElement('div');
            winnerDiv.style.cssText = `
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                font-size: 3rem;
                font-weight: bold;
                color: #00FF88;
                text-shadow: 0 0 30px #00FF88;
                z-index: 2000;
                animation: winnerPop 2s ease-out forwards;
                pointer-events: none;
            `;
            winnerDiv.textContent = playerName;
            document.body.appendChild(winnerDiv);
            
            setTimeout(() => winnerDiv.remove(), 2000);
        }

        function setQuarterFinalWinner(matchIndex, teamNumber) {
            const match = matches[matchIndex];
            const winner = teamNumber === 1 ? match.team1 : match.team2;
            match.winner = winner;
            tournamentWinners.quarterFinals.push(winner);
            
            // Update semi finals
            updateSemiFinals();
            
            // Animate winner
            animateWinnerSelection(`???? ${teamNumber} ????!`);
            showMessage(`?? ????? ?????? ?? ???????? ${matchIndex + 1}`, 'success');
        }

        function updateSemiFinals() {
            if (tournamentWinners.quarterFinals.length === 4) {
                // Update semi final 1
                const semi1 = document.getElementById('semi-final-0');
                semi1.innerHTML = `
                    <div class="match-header">??? ??????? 1</div>
                    <div class="match-teams">
                        <div class="bracket-team">
                            <span class="team-color" style="color: ${tournamentWinners.quarterFinals[0][0].color}">?</span>
                            ${tournamentWinners.quarterFinals[0][0].name} + ${tournamentWinners.quarterFinals[0][1].name}
                        </div>
                        <div class="bracket-vs">VS</div>
                        <div class="bracket-team">
                            <span class="team-color" style="color: ${tournamentWinners.quarterFinals[1][0].color}">?</span>
                            ${tournamentWinners.quarterFinals[1][0].name} + ${tournamentWinners.quarterFinals[1][1].name}
                        </div>
                    </div>
                    <button class="winner-btn" onclick="setSemiFinalWinner(0, 1)" style="background: ${tournamentWinners.quarterFinals[0][0].color}">
                        ???? 1 ????
                    </button>
                    <button class="winner-btn" onclick="setSemiFinalWinner(0, 2)" style="background: ${tournamentWinners.quarterFinals[1][0].color}">
                        ???? 2 ????
                    </button>
                `;
                
                // Update semi final 2
                const semi2 = document.getElementById('semi-final-1');
                semi2.innerHTML = `
                    <div class="match-header">??? ??????? 2</div>
                    <div class="match-teams">
                        <div class="bracket-team">
                            <span class="team-color" style="color: ${tournamentWinners.quarterFinals[2][0].color}">?</span>
                            ${tournamentWinners.quarterFinals[2][0].name} + ${tournamentWinners.quarterFinals[2][1].name}
                        </div>
                        <div class="bracket-vs">VS</div>
                        <div class="bracket-team">
                            <span class="team-color" style="color: ${tournamentWinners.quarterFinals[3][0].color}">?</span>
                            ${tournamentWinners.quarterFinals[3][0].name} + ${tournamentWinners.quarterFinals[3][1].name}
                        </div>
                    </div>
                    <button class="winner-btn" onclick="setSemiFinalWinner(1, 1)" style="background: ${tournamentWinners.quarterFinals[2][0].color}">
                        ???? 1 ????
                    </button>
                    <button class="winner-btn" onclick="setSemiFinalWinner(1, 2)" style="background: ${tournamentWinners.quarterFinals[3][0].color}">
                        ???? 2 ????
                    </button>
                `;
            }
        }

        function setSemiFinalWinner(semiIndex, teamNumber) {
            const winnerIndex = semiIndex === 0 ? (teamNumber === 1 ? 0 : 1) : (teamNumber === 1 ? 2 : 3);
            const winner = tournamentWinners.quarterFinals[winnerIndex];
            tournamentWinners.semiFinals.push(winner);
            
            // Update final
            updateFinal();
            
            animateWinnerSelection(`?????? ??? ??????? ${semiIndex + 1}!`);
            showMessage(`?? ????? ?????? ?? ??? ??????? ${semiIndex + 1}`, 'success');
        }

        function updateFinal() {
            if (tournamentWinners.semiFinals.length === 2) {
                const final = document.getElementById('final-match');
                final.innerHTML = `
                    <div class="match-header">?? ???????? ???????? ??</div>
                    <div class="match-teams">
                        <div class="bracket-team">
                            <span class="team-color" style="color: ${tournamentWinners.semiFinals[0][0].color}">?</span>
                            ${tournamentWinners.semiFinals[0][0].name} + ${tournamentWinners.semiFinals[0][1].name}
                        </div>
                        <div class="bracket-vs">VS</div>
                        <div class="bracket-team">
                            <span class="team-color" style="color: ${tournamentWinners.semiFinals[1][0].color}">?</span>
                            ${tournamentWinners.semiFinals[1][0].name} + ${tournamentWinners.semiFinals[1][1].name}
                        </div>
                    </div>
                    <button class="winner-btn champion-btn" onclick="setChampion(1)" style="background: ${tournamentWinners.semiFinals[0][0].color}">
                        ?? ???? 1 ???? ??
                    </button>
                    <button class="winner-btn champion-btn" onclick="setChampion(2)" style="background: ${tournamentWinners.semiFinals[1][0].color}">
                        ?? ???? 2 ???? ??
                    </button>
                `;
            }
        }

        function setChampion(teamNumber) {
            const champion = teamNumber === 1 ? tournamentWinners.semiFinals[0] : tournamentWinners.semiFinals[1];
            tournamentWinners.final = champion;
            
            // Show champion celebration
            showChampionCelebration(champion);
            showMessage('?? ?? ????? ??? ???????! ??', 'success');
        }

        function showChampionCelebration(champion) {
            const celebration = document.createElement('div');
            celebration.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0, 0, 0, 0.9);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 3000;
                animation: fadeIn 0.5s ease;
            `;
            
            celebration.innerHTML = `
                <div style="text-align: center; animation: championBounce 1s ease infinite alternate;">
                    <div style="font-size: 4rem; margin-bottom: 20px;">??</div>
                    <h1 style="color: #FFD700; font-size: 3rem; text-shadow: 0 0 30px #FFD700; margin: 0;">
                        ?????!
                    </h1>
                    <div style="color: #fff; font-size: 2rem; margin-top: 20px;">
                        <span style="color: ${champion[0].color}">?</span>
                        ${champion[0].name} + ${champion[1].name}
                    </div>
                    <button onclick="this.parentElement.parentElement.remove()" style="
                        margin-top: 30px;
                        padding: 15px 30px;
                        font-size: 1.2rem;
                        background: linear-gradient(45deg, #FFD700, #FFA500);
                        border: none;
                        border-radius: 10px;
                        color: #000;
                        font-weight: bold;
                        cursor: pointer;
                    ">
                        ?????
                    </button>
                </div>
            `;
            
            document.body.appendChild(celebration);
        }

        function showMessage(message, type) {
            // Create a simple toast notification
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                top: 20px;
                left: 50%;
                transform: translateX(-50%);
                padding: 15px 25px;
                background: ${type === 'error' ? '#FF006E' : type === 'success' ? '#00FF88' : '#00D9FF'};
                color: #000;
                border-radius: 8px;
                font-weight: bold;
                z-index: 1000;
                animation: slideDown 0.3s ease;
                box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'slideUp 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Add slide animations
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideDown {
                from { transform: translate(-50%, -100%); opacity: 0; }
                to { transform: translate(-50%, 0); opacity: 1; }
            }
            @keyframes slideUp {
                from { transform: translate(-50%, 0); opacity: 1; }
                to { transform: translate(-50%, -100%); opacity: 0; }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
